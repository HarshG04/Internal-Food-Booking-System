<mat-sidenav-container class="manager-container">
  <mat-sidenav mode="side" opened class="manager-sidenav">
    <div class="sidenav-header">
      <div class="brand">🍽️ FoodCourt</div>
      <div class="mgr-info">
        <div class="avatar">{{ user()?.fullName?.charAt(0) || 'M' }}</div>
        <div>
          <div class="mgr-name">{{ user()?.fullName }}</div>
          <div class="mgr-role">Food Court Manager</div>
        </div>
      </div>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
          class="nav-item"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-stroked-button class="logout-btn" (click)="auth.logout()">
        <mat-icon>logout</mat-icon> Sign Out
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="manager-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
