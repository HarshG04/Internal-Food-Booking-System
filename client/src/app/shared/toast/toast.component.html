<div class="toast-container">
  @for (n of notifications(); track n.id) {
    <div class="toast toast-{{ n.type }}" [@toastAnim]>
      <span class="toast-icon" aria-hidden="true">{{ iconFor(n) }}</span>
      <span class="toast-msg">{{ n.message }}</span>
      <button type="button" class="dismiss-btn" (click)="notifService.dismiss(n.id)" aria-label="Dismiss">&#x2715;</button>
    </div>
  }
</div>
