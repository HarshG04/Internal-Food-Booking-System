<div class="toast-container">
  @for (n of notifications(); track n.id) {
    <div class="toast toast-{{ n.type }}" [@toastAnim]>
      <mat-icon class="toast-icon">{{ iconFor(n) }}</mat-icon>
      <span class="toast-msg">{{ n.message }}</span>
      <button mat-icon-button class="dismiss-btn" (click)="notifService.dismiss(n.id)">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }
</div>
